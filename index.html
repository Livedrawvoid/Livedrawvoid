<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cozy Art Corner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="hero">
        <div class="hero-content">
            <h1>My Cozy Art Corner</h1>
            <div class="scroll-down">Scroll down to see more</div>
            <div class="scroll-arrow">↓</div>
        </div>
    </section>

    <section class="main-content">
        <div class="oc-container">
            <div id="oc-box" class="oc-box">
                <video id="vid-intro" class="oc-video" muted playsinline><source src="intro.webm" type="video/webm"></video>
                <video id="vid-loop" class="oc-video" muted playsinline><source src="loop.webm" type="video/webm"></video>
                <video id="vid-wave" class="oc-video" muted playsinline><source src="wave.webm" type="video/webm"></video>
            </div>
        </div>

        <div class="bottom-nav-card">
            <div class="nav-section">
                <a href="gallery.html" class="btn-video-link">
                    <video autoplay loop muted playsinline class="btn-video"><source src="nav_gallery.webm" type="video/webm"></video>
                </a>
                <a href="tos.html" class="btn-video-link">
                    <video autoplay loop muted playsinline class="btn-video"><source src="nav_tos.webm" type="video/webm"></video>
                </a>
            </div>
            <div class="social-section">
                <div class="social-links">
                    <a href="https://twitter.com/yourusername" target="_blank" class="btn-video-link">
                        <video autoplay loop muted playsinline class="btn-video soc-btn"><source src="nav_twitter.webm" type="video/webm"></video>
                    </a>
                    <a href="https://instagram.com/yourusername" target="_blank" class="btn-video-link">
                        <video autoplay loop muted playsinline class="btn-video soc-btn"><source src="nav_instagram.webm" type="video/webm"></video>
                    </a>
                    <a href="https://discord.gg/yourinvite" target="_blank" class="btn-video-link">
                        <video autoplay loop muted playsinline class="btn-video soc-btn"><source src="nav_discord.webm" type="video/webm"></video>
                    </a>
                    <a href="mailto:youremail@domain.com" class="btn-video-link">
                        <video autoplay loop muted playsinline class="btn-video soc-btn"><source src="nav_email.webm" type="video/webm"></video>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
