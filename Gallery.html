<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | LiveDrawVoid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section>
        <div class="top-platform">
            <img src="cutoff.avif" class="btm-platform">
        </div>
    </section>
    
    <header class="page-header">

        <h1>
            Gallery
            <video autoplay loop muted playsinline class="header-emoji"><source src="nav_gallery.webm" type="video/webm"></video>
        </h1>
        <a href="https://livedrawvoid.github.io/Livedrawvoid" class="btn-video-link">
            <video autoplay loop muted playsinline class="btn-video nav-back"><source src="nav_home.webm" type="video/webm"></video>
        </a>

        <div class="gallery-social-promo">
            <h2>Want to see more of my stuff? check my socials!</h2>
            <div class="social-links">
                <a href="https://twitter.com/LiveDrawVoid" target="_blank" class="btn-video-link">
                    <video autoplay loop muted playsinline class="btn-video soc-btn"><source src="nav_twitter.webm" type="video/webm"></video>
                </a>
                <a href="https://instagram.com/LiveDrawVoid_insta" target="_blank" class="btn-video-link">
                    <video autoplay loop muted playsinline class="btn-video soc-btn"><source src="nav_instagram.webm" type="video/webm"></video>
                </a>
            </div>
        </div>
                
    </header>

    <section class="gallery-section">

        <div class="gallery-grid">
            <video autoplay loop muted playsinline class="gallery-item"><source src="showcase1.webm" type="video/webm"></video>
            <video autoplay loop muted playsinline class="gallery-item"><source src="showcase2.webm" type="video/webm"></video>

            <video autoplay loop muted playsinline class="gallery-item"><source src="halfbody1.webm" type="video/webm"></video>
            <video autoplay loop muted playsinline class="gallery-item"><source src="halfbody2.webm" type="video/webm"></video>
            <video autoplay loop muted playsinline class="gallery-item"><source src="halfbody3.webm" type="video/webm"></video>
            <video autoplay loop muted playsinline class="gallery-item"><source src="halfbody4.webm" type="video/webm"></video>

            <video autoplay loop muted playsinline class="gallery-item"><source src="emoji1.webm" type="video/webm"></video>
            <video autoplay loop muted playsinline class="gallery-item"><source src="emoji2.webm" type="video/webm"></video>
            <video autoplay loop muted playsinline class="gallery-item"><source src="emoji3.webm" type="video/webm"></video>
            <video autoplay loop muted playsinline class="gallery-item"><source src="emoji4.webm" type="video/webm"></video>
            <video autoplay loop muted playsinline class="gallery-item"><source src="emoji5.webm" type="video/webm"></video>
            <video autoplay loop muted playsinline class="gallery-item"><source src="emoji6.webm" type="video/webm"></video>
        </div>

    </section>

    <div id="video-modal" class="modal">
        <div class="modal-close">×</div>
        <video id="modal-video" autoplay loop muted playsinline></video>
    </div>

    <script src="script.js"></script>
</body>
</html>
